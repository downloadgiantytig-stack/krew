<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squad — Krew</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
<main class="page-content">
  <div id="squad-loading" style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <div class="spinner spinner-lg"></div>
  </div>

  <div id="squad-content" class="hidden">
    <!-- Back + breadcrumb -->
    <div class="container" style="padding-top:var(--space-8)">
      <a href="/squads" style="display:inline-flex;align-items:center;gap:6px;font-size:0.875rem;color:var(--muted-light);text-decoration:none;margin-bottom:var(--space-6);transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted-light)'">
        ← Back to Squads
      </a>

      <div class="detail-layout">
        <!-- Main content -->
        <div>
          <div style="display:flex;align-items:flex-start;gap:var(--space-5);margin-bottom:var(--space-6);flex-wrap:wrap">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap">
                <span id="sq-status-badge" class="badge badge-open">Open</span>
                <span id="sq-duration-chip" class="category-chip hidden"></span>
                <span id="sq-payout-chip" class="tag green hidden"></span>
              </div>
              <h1 id="sq-title" style="font-size:clamp(1.5rem,3vw,2.25rem);font-weight:700;margin-bottom:var(--space-4);font-family:var(--font-display)"></h1>
              <p id="sq-desc" style="font-size:1.0625rem;color:var(--muted-light);line-height:1.7;margin-bottom:var(--space-6)"></p>
              <div id="sq-tags" class="tags" style="margin-bottom:var(--space-6)"></div>
            </div>
          </div>

          <!-- Posts / Updates -->
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-5)">
              <h2 style="font-size:1.125rem;font-weight:600">Squad Updates</h2>
              <button class="btn btn-secondary btn-sm" id="post-toggle" onclick="togglePostForm()">+ Post Update</button>
            </div>

            <!-- Post form (hidden by default) -->
            <div id="post-form" class="card hidden" style="margin-bottom:var(--space-5)">
              <textarea class="input" id="post-content" placeholder="Share an update, ask a question, or post a quick win…" rows="3" style="margin-bottom:var(--space-3)"></textarea>
              <div style="display:flex;gap:var(--space-3);justify-content:flex-end">
                <button class="btn btn-ghost btn-sm" onclick="togglePostForm()">Cancel</button>
                <button class="btn btn-primary btn-sm" onclick="submitPost()">Post →</button>
              </div>
            </div>

            <div id="posts-list" style="display:flex;flex-direction:column;gap:var(--space-4)"></div>
            <div id="posts-empty" class="empty-state hidden">
              <div class="empty-icon">📢</div>
              <h3 style="font-size:1rem">No updates yet</h3>
              <p>Join the squad and be first to post!</p>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
          <!-- Join / Leave -->
          <div class="card" style="text-align:center">
            <div id="sq-member-count" style="font-family:var(--font-display);font-size:2rem;font-weight:700;margin-bottom:4px">0</div>
            <div style="font-size:0.875rem;color:var(--muted-light);margin-bottom:var(--space-5)">members</div>
            <button class="btn btn-primary w-full" id="join-btn" onclick="handleJoin()" style="display:none">Join Squad →</button>
            <button class="btn btn-danger w-full"  id="leave-btn" onclick="handleLeave()" style="display:none">Leave Squad</button>
            <p id="login-to-join" style="font-size:0.8125rem;color:var(--muted)">
              <a href="/login" style="color:var(--purple-light)">Sign in</a> to join
            </p>
          </div>

          <!-- Creator -->
          <div class="card">
            <div class="uppercase" style="margin-bottom:var(--space-4)">Squad Creator</div>
            <div id="sq-creator" style="display:flex;align-items:center;gap:var(--space-3)"></div>
          </div>

          <!-- Members -->
          <div class="card">
            <div class="uppercase" style="margin-bottom:var(--space-4)">Members</div>
            <div id="sq-members" style="display:flex;flex-direction:column;gap:var(--space-3)"></div>
          </div>

          <!-- Meta -->
          <div class="card">
            <div class="uppercase" style="margin-bottom:var(--space-4)">Details</div>
            <div id="sq-meta" style="display:flex;flex-direction:column;gap:var(--space-3)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="squad-error" class="hidden" style="text-align:center;padding:var(--space-24) var(--space-6)">
    <div style="font-size:3rem;margin-bottom:var(--space-4)">😕</div>
    <h2>Squad not found</h2>
    <p style="color:var(--muted-light);margin-top:var(--space-3)">This squad may have been removed or doesn't exist.</p>
    <a href="/squads" class="btn btn-primary" style="margin-top:var(--space-6)">Browse Squads</a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module">
  import { initNav, showToast } from '/js/nav.js';
  import { getSquad, joinSquad, leaveSquad, isSquadMember, getPosts, createPost } from '/js/db.js';
  import { initAuth, getUser, isLoggedIn } from '/js/auth.js';
  import { getQueryParam, timeAgo, getInitials, getAvatarColor } from '/js/config.js';

  await initNav('squads');
  await initAuth();

  let squadData = null;
  let isMember  = false;
  const squadId = getQueryParam('id');

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function avatarEl(user, size='') {
    const init = getInitials(user.full_name||user.username||'?');
    const col  = getAvatarColor(user.username||'');
    return `<a href="/profile?u=${esc(user.username)}" class="avatar ${size} ${col}" title="${esc(user.full_name||user.username)}" style="text-decoration:none">
      ${user.avatar_url?`<img src="${esc(user.avatar_url)}" alt="">`:`${init}`}
    </a>`;
  }

  function renderMeta(squad) {
    const rows = [];
    if (squad.duration)     rows.push(['⏱ Duration', squad.duration]);
    if (squad.payout_model) rows.push(['💰 Payout', squad.payout_model]);
    if (squad.max_members)  rows.push(['👥 Max members', squad.max_members]);
    rows.push(['📅 Created', new Date(squad.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})]);
    return rows.map(([k,v])=>`<div style="display:flex;justify-content:space-between;font-size:0.875rem"><span style="color:var(--muted-light)">${esc(k)}</span><span style="font-weight:500">${esc(v)}</span></div>`).join('');
  }

  function renderPost(post) {
    const a    = post.author||{};
    const init = getInitials(a.full_name||a.username||'?');
    const col  = getAvatarColor(a.username||'');
    return `
      <div class="card" style="padding:var(--space-5)">
        <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)">
          ${avatarEl(a,'avatar-sm')}
          <div>
            <a href="/profile?u=${esc(a.username)}" style="font-size:0.875rem;font-weight:600;color:var(--text)">${esc(a.username)}</a>
            <div style="font-size:0.75rem;color:var(--muted)">${timeAgo(post.created_at)}</div>
          </div>
        </div>
        <p style="font-size:0.9375rem;line-height:1.65;white-space:pre-wrap;word-break:break-word">${esc(post.content)}</p>
      </div>
    `;
  }

  async function loadSquad() {
    if (!squadId) { showError(); return; }
    try {
      squadData = await getSquad(squadId);
      if (!squadData) { showError(); return; }

      document.title = `${squadData.name} — Krew`;

      const statusMap = { open:'badge-open', in_progress:'badge-progress', completed:'badge-closed' };
      const statusLabel = { open:'Open', in_progress:'In Progress', completed:'Completed' };

      document.getElementById('sq-title').textContent           = squadData.name;
      document.getElementById('sq-desc').textContent            = squadData.description || '';
      document.getElementById('sq-status-badge').className      = `badge ${statusMap[squadData.status]||'badge-open'}`;
      document.getElementById('sq-status-badge').textContent    = statusLabel[squadData.status]||'Open';

      const durChip = document.getElementById('sq-duration-chip');
      if (squadData.duration) { durChip.textContent=squadData.duration; durChip.classList.remove('hidden'); }

      const payChip = document.getElementById('sq-payout-chip');
      if (squadData.payout_model) { payChip.textContent='💰 '+squadData.payout_model; payChip.classList.remove('hidden'); }

      // Tags
      const tagsEl = document.getElementById('sq-tags');
      tagsEl.innerHTML = (squadData.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');

      // Creator
      const cr = squadData.creator||{};
      document.getElementById('sq-creator').innerHTML = `
        ${avatarEl(cr, 'avatar-lg')}
        <div>
          <a href="/profile?u=${esc(cr.username)}" style="font-weight:600;color:var(--text);font-size:0.9375rem">${esc(cr.full_name||cr.username)}</a>
          <div style="font-size:0.8rem;color:var(--muted-light)">@${esc(cr.username)}</div>
        </div>
      `;

      // Members
      const members = squadData.squad_members || [];
      document.getElementById('sq-member-count').textContent = members.length;

      const membersEl = document.getElementById('sq-members');
      membersEl.innerHTML = members.slice(0,8).map(m => {
        const u = m.user||{};
        return `
          <div style="display:flex;align-items:center;gap:var(--space-3)">
            ${avatarEl(u,'avatar-sm')}
            <div style="flex:1">
              <a href="/profile?u=${esc(u.username)}" style="font-size:0.875rem;font-weight:500;color:var(--text)">${esc(u.full_name||u.username||'?')}</a>
              ${m.role==='owner'?`<span style="font-size:0.7rem;color:var(--purple-light);margin-left:4px">★ owner</span>`:''}
            </div>
          </div>
        `;
      }).join('');
      if (members.length > 8) {
        membersEl.insertAdjacentHTML('beforeend', `<div style="font-size:0.8rem;color:var(--muted)">+${members.length-8} more</div>`);
      }

      // Meta
      document.getElementById('sq-meta').innerHTML = renderMeta(squadData);

      // Join/leave state
      updateJoinUI();

      // Show content
      document.getElementById('squad-loading').style.display='none';
      document.getElementById('squad-content').classList.remove('hidden');

      // Load posts
      loadPosts();
    } catch (err) {
      console.error(err);
      showError();
    }
  }

  async function updateJoinUI() {
    const user = getUser();
    const joinBtn   = document.getElementById('join-btn');
    const leaveBtn  = document.getElementById('leave-btn');
    const loginHint = document.getElementById('login-to-join');

    if (!user) {
      loginHint.style.display = '';
      joinBtn.style.display   = 'none';
      leaveBtn.style.display  = 'none';
      return;
    }
    loginHint.style.display = 'none';

    // Check if creator (don't show join/leave)
    if (squadData.creator_id === user.id) {
      joinBtn.style.display  = 'none';
      leaveBtn.style.display = 'none';
      return;
    }

    isMember = await isSquadMember(squadId, user.id);
    joinBtn.style.display  = isMember ? 'none'  : '';
    leaveBtn.style.display = isMember ? ''      : 'none';
  }

  window.handleJoin = async () => {
    const user = getUser();
    if (!user) { window.location.href='/login'; return; }
    const btn = document.getElementById('join-btn');
    btn.disabled = true;
    try {
      await joinSquad(squadId, user.id);
      isMember = true;
      document.getElementById('join-btn').style.display = 'none';
      document.getElementById('leave-btn').style.display = '';
      showToast('Joined the squad! 🚀', 'success');
      loadSquad(); // refresh member count
    } catch(err) { showToast(err.message,'error'); }
    finally { btn.disabled=false; }
  };

  window.handleLeave = async () => {
    if (!confirm('Leave this squad?')) return;
    const user = getUser();
    try {
      await leaveSquad(squadId, user.id);
      isMember = false;
      document.getElementById('leave-btn').style.display = 'none';
      document.getElementById('join-btn').style.display = '';
      showToast('Left the squad','info');
      loadSquad();
    } catch(err) { showToast(err.message,'error'); }
  };

  async function loadPosts() {
    const posts = await getPosts({ squadId, limit:20 });
    const list  = document.getElementById('posts-list');
    const empty = document.getElementById('posts-empty');
    if (!posts.length) { list.innerHTML=''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    list.innerHTML = posts.map(renderPost).join('');
  }

  window.togglePostForm = () => {
    const user = getUser();
    if (!user) { window.location.href='/login'; return; }
    const form = document.getElementById('post-form');
    form.classList.toggle('hidden');
  };

  window.submitPost = async () => {
    const user    = getUser();
    const content = document.getElementById('post-content').value.trim();
    if (!content) { showToast('Write something first!','error'); return; }
    try {
      const post = await createPost({ author_id:user.id, squad_id:squadId, content, type:'update' });
      document.getElementById('post-content').value = '';
      document.getElementById('post-form').classList.add('hidden');
      document.getElementById('posts-empty').classList.add('hidden');
      document.getElementById('posts-list').insertAdjacentHTML('afterbegin', renderPost(post));
      showToast('Posted! ✓','success');
    } catch(err) { showToast(err.message,'error'); }
  };

  function showError() {
    document.getElementById('squad-loading').style.display='none';
    document.getElementById('squad-error').classList.remove('hidden');
  }

  loadSquad();
</script>
</body>
</html>
