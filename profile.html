<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Krew</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <style>
    .profile-hero {
      background: linear-gradient(180deg, rgba(124,58,237,0.08) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--space-16) + 65px) 0 var(--space-10);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .edit-field { display: none; }
    body.edit-mode .edit-field { display: block; }
    body.edit-mode .view-field { display: none; }
  </style>
</head>
<body>
<main class="page-content" style="padding-top:0">
  <!-- Loading -->
  <div id="profile-loading" style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <div class="spinner spinner-lg"></div>
  </div>

  <!-- Content -->
  <div id="profile-content" class="hidden">
    <!-- Profile Hero -->
    <div class="profile-hero">
      <div class="container">
        <div style="display:flex;align-items:flex-start;gap:var(--space-6);flex-wrap:wrap">
          <!-- Avatar -->
          <div id="profile-avatar" class="avatar" style="width:96px;height:96px;font-size:2rem;border:3px solid var(--border-strong);flex-shrink:0"></div>

          <!-- Info -->
          <div style="flex:1;min-width:200px">
            <div id="profile-name" style="font-family:var(--font-display);font-size:1.75rem;font-weight:700;margin-bottom:4px"></div>
            <div id="profile-username" style="font-size:1rem;color:var(--muted-light);margin-bottom:var(--space-4)"></div>

            <!-- View mode bio -->
            <p id="profile-bio" class="view-field" style="font-size:0.9375rem;color:var(--text-secondary);line-height:1.65;max-width:520px;margin-bottom:var(--space-4)"></p>

            <!-- Edit mode bio -->
            <textarea class="input edit-field" id="edit-bio" rows="2" placeholder="Tell the world what you build…" style="max-width:520px;margin-bottom:var(--space-4)"></textarea>

            <!-- Skills -->
            <div id="profile-skills" class="tags view-field" style="margin-bottom:var(--space-4)"></div>
            <input class="input edit-field" id="edit-skills" placeholder="Skills (comma separated)" style="max-width:400px;margin-bottom:var(--space-4)">

            <!-- Github view/edit -->
            <div class="view-field" id="github-link-wrap" style="display:none">
              <a id="profile-github" href="#" target="_blank" class="btn btn-ghost btn-sm" style="gap:6px">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385c.6.105.825-.255.825-.57c0-.285-.015-1.23-.015-2.235c-3.015.555-3.795-.735-4.035-1.41c-.135-.345-.72-1.41-1.23-1.695c-.42-.225-1.02-.78-.015-.795c.945-.015 1.62.87 1.845 1.23c1.08 1.815 2.805 1.305 3.495.99c.105-.78.42-1.305.765-1.605c-2.67-.3-5.46-1.335-5.46-5.925c0-1.305.465-2.385 1.23-3.225c-.12-.3-.54-1.53.12-3.18c0 0 1.005-.315 3.3 1.23c.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23c.66 1.65.24 2.88.12 3.18c.765.84 1.23 1.905 1.23 3.225c0 4.605-2.805 5.625-5.475 5.925c.435.375.81 1.095.81 2.22c0 1.605-.015 2.895-.015 3.3c0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub
              </a>
            </div>
            <input class="input edit-field" id="edit-github" type="url" placeholder="https://github.com/username" style="max-width:400px;margin-bottom:12px">
          </div>

          <!-- Actions -->
          <div style="display:flex;gap:var(--space-3);flex-shrink:0" id="profile-actions"></div>
        </div>
      </div>
    </div>

    <!-- Tabs + content -->
    <div class="container" style="padding-top:var(--space-8);padding-bottom:var(--space-16)">
      <div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-8);border-bottom:1px solid var(--border)">
        <button class="tab active" id="tab-squads" onclick="switchProfileTab('squads',this)" style="border-radius:0;border-bottom:2px solid var(--purple-light);padding:var(--space-3) var(--space-4)">
          Squads <span id="tab-squads-count" style="font-size:0.75rem;color:var(--muted-light);margin-left:4px"></span>
        </button>
        <button class="tab" id="tab-products" onclick="switchProfileTab('products',this)" style="border-radius:0;border-bottom:2px solid transparent;padding:var(--space-3) var(--space-4)">
          Products <span id="tab-products-count" style="font-size:0.75rem;color:var(--muted-light);margin-left:4px"></span>
        </button>
      </div>

      <!-- Squads tab -->
      <div id="content-squads" class="tab-content active">
        <div id="profile-squads-grid" class="grid grid-auto-fill" style="gap:var(--space-5)"></div>
        <div id="profile-squads-empty" class="empty-state hidden">
          <div class="empty-icon">👥</div>
          <h3>No squads yet</h3>
          <p>Join or create a squad to get started.</p>
          <a href="/squads" class="btn btn-primary">Find Squads →</a>
        </div>
      </div>

      <!-- Products tab -->
      <div id="content-products" class="tab-content">
        <div id="profile-products-grid" class="grid grid-auto-fill" style="gap:var(--space-5)"></div>
        <div id="profile-products-empty" class="empty-state hidden">
          <div class="empty-icon">🛒</div>
          <h3>No products listed yet</h3>
          <p>List your first script or template in the marketplace.</p>
          <a href="/marketplace" class="btn btn-primary">List Product →</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div id="profile-error" class="hidden" style="text-align:center;padding:var(--space-24) var(--space-6)">
    <div style="font-size:3rem;margin-bottom:var(--space-4)">👤</div>
    <h2>User not found</h2>
    <a href="/explore" class="btn btn-primary" style="margin-top:var(--space-6)">Back to Explore</a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module">
  import { initNav, showToast } from '/js/nav.js';
  import { getProfileByUsername, updateProfile, getUserSquads, getUserProducts } from '/js/db.js';
  import { initAuth, getUser, isLoggedIn } from '/js/auth.js';
  import { getQueryParam, timeAgo, formatPrice, getInitials, getAvatarColor, CATEGORIES } from '/js/config.js';

  await initNav('profile');
  await initAuth();

  const username  = getQueryParam('u');
  let profileData = null;
  let isOwnProfile = false;
  let editMode    = false;

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  window.switchProfileTab = (tab, el) => {
    document.querySelectorAll('.tab').forEach(t=>{
      t.classList.remove('active');
      t.style.borderBottomColor='transparent';
    });
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    el.style.borderBottomColor='var(--purple-light)';
    document.getElementById(`content-${tab}`).classList.add('active');
  };

  async function loadProfile() {
    if (!username) { showError(); return; }
    try {
      profileData = await getProfileByUsername(username);
      if (!profileData) { showError(); return; }

      const user = getUser();
      isOwnProfile = user && user.id === profileData.id;
      document.title = `${profileData.full_name||profileData.username} — Krew`;

      // Avatar
      const avatarEl = document.getElementById('profile-avatar');
      const init     = getInitials(profileData.full_name||profileData.username||'?');
      const col      = getAvatarColor(profileData.username||'');
      avatarEl.className = `avatar ${col}`;
      avatarEl.style.cssText = 'width:96px;height:96px;font-size:2rem;border:3px solid var(--border-strong);flex-shrink:0';
      avatarEl.innerHTML = profileData.avatar_url ? `<img src="${esc(profileData.avatar_url)}" alt="">` : init;

      // Name / username
      document.getElementById('profile-name').textContent     = profileData.full_name || profileData.username || '';
      document.getElementById('profile-username').textContent  = `@${profileData.username}`;

      // Bio
      const bioEl = document.getElementById('profile-bio');
      bioEl.textContent = profileData.bio || (isOwnProfile ? 'Add a bio to introduce yourself…' : '');
      bioEl.style.color = profileData.bio ? 'var(--text-secondary)' : 'var(--muted)';

      // Skills
      const skillsEl = document.getElementById('profile-skills');
      skillsEl.innerHTML = (profileData.skills||[]).map(s=>`<span class="skill-chip">${esc(s)}</span>`).join('');

      // GitHub
      if (profileData.github_url) {
        const ghWrap = document.getElementById('github-link-wrap');
        ghWrap.style.display='block';
        document.getElementById('profile-github').href=profileData.github_url;
      }

      // Set edit fields
      document.getElementById('edit-bio').value    = profileData.bio||'';
      document.getElementById('edit-skills').value = (profileData.skills||[]).join(', ');
      document.getElementById('edit-github').value = profileData.github_url||'';

      // Actions
      const actionsEl = document.getElementById('profile-actions');
      if (isOwnProfile) {
        actionsEl.innerHTML = `
          <button class="btn btn-secondary" id="edit-toggle-btn" onclick="toggleEdit()">Edit Profile</button>
          <button class="btn btn-primary hidden" id="save-btn" onclick="saveProfile()">Save →</button>
          <button class="btn btn-ghost hidden" id="cancel-btn" onclick="toggleEdit(true)">Cancel</button>
        `;
      }

      document.getElementById('profile-loading').style.display='none';
      document.getElementById('profile-content').classList.remove('hidden');

      // Load squads + products
      loadSquads();
      loadProducts();
    } catch (err) {
      console.error(err);
      showError();
    }
  }

  async function loadSquads() {
    try {
      const squads  = await getUserSquads(profileData.id);
      const grid    = document.getElementById('profile-squads-grid');
      const empty   = document.getElementById('profile-squads-empty');
      document.getElementById('tab-squads-count').textContent = `(${squads.length})`;
      if (!squads.length) { grid.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      grid.innerHTML = squads.map(s => {
        const sc  = { open:'badge-open', in_progress:'badge-progress', completed:'badge-closed' }[s.status]||'badge-open';
        const sl  = { open:'Open', in_progress:'In Progress', completed:'Completed' }[s.status]||'Open';
        return `
          <a href="/squad?id=${s.id}" class="card squad-card" style="text-decoration:none;display:flex;flex-direction:column;gap:12px">
            <div style="display:flex;justify-content:space-between">
              <span class="badge ${sc}">${sl}</span>
              ${s.role==='owner'?`<span class="tag green">★ Owner</span>`:''}
            </div>
            <div>
              <h3 style="font-size:1rem;font-family:var(--font-display);font-weight:600;margin-bottom:5px">${esc(s.name)}</h3>
              <p style="font-size:0.8rem;color:var(--muted-light);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(s.description||'')}</p>
            </div>
            ${(s.tags||[]).length?`<div class="tags">${(s.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
          </a>
        `;
      }).join('');
    } catch(_) {}
  }

  async function loadProducts() {
    try {
      const products = await getUserProducts(profileData.id);
      const grid     = document.getElementById('profile-products-grid');
      const empty    = document.getElementById('profile-products-empty');
      document.getElementById('tab-products-count').textContent = `(${products.length})`;
      if (!products.length) { grid.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      grid.innerHTML = products.map(p => {
        const cat = CATEGORIES.find(c=>c.value===p.category)||{emoji:'📦',label:'Other'};
        const isg = p.checkout_type==='gumroad';
        return `
          <div class="card product-card" onclick="window.location='/product?id=${p.id}'" style="cursor:pointer;padding:0">
            <div style="height:120px;background:linear-gradient(135deg,var(--bg-3),var(--bg-2));display:flex;align-items:center;justify-content:center;font-size:2.5rem;border-radius:var(--radius) var(--radius) 0 0;overflow:hidden">
              ${p.preview_image_url?`<img src="${esc(p.preview_image_url)}" style="width:100%;height:100%;object-fit:cover" alt="">`:`${cat.emoji}`}
            </div>
            <div style="padding:16px">
              <span class="category-chip" style="margin-bottom:8px;display:inline-block">${cat.emoji} ${cat.label}</span>
              <h3 style="font-size:0.9375rem;font-weight:600;margin-bottom:8px;font-family:var(--font-display)">${esc(p.title)}</h3>
              <div style="display:flex;align-items:center;justify-content:space-between">
                <span style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;${!p.price_usd?'color:var(--green)':''}">${formatPrice(p.price_usd)}</span>
                <a href="${esc(p.checkout_url)}" target="_blank" rel="noopener" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">${isg?'Gumroad':'Buy'} ↗</a>
              </div>
            </div>
          </div>
        `;
      }).join('');
    } catch(_) {}
  }

  window.toggleEdit = (cancel=false) => {
    editMode = cancel ? false : !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    document.getElementById('edit-toggle-btn').classList.toggle('hidden', editMode);
    document.getElementById('save-btn').classList.toggle('hidden', !editMode);
    document.getElementById('cancel-btn').classList.toggle('hidden', !editMode);
  };

  window.saveProfile = async () => {
    const user = getUser();
    const bio    = document.getElementById('edit-bio').value.trim();
    const skills = document.getElementById('edit-skills').value.split(',').map(s=>s.trim()).filter(Boolean);
    const github = document.getElementById('edit-github').value.trim()||null;
    const btn    = document.getElementById('save-btn');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
    try {
      await updateProfile(user.id, { bio, skills, github_url: github });
      profileData = { ...profileData, bio, skills, github_url: github };
      // Update view
      document.getElementById('profile-bio').textContent = bio || 'Add a bio…';
      document.getElementById('profile-skills').innerHTML = skills.map(s=>`<span class="skill-chip">${esc(s)}</span>`).join('');
      if (github) {
        document.getElementById('github-link-wrap').style.display='block';
        document.getElementById('profile-github').href=github;
      }
      toggleEdit(true);
      showToast('Profile updated! ✓','success');
    } catch(err) { showToast(err.message,'error'); }
    finally { btn.disabled=false; btn.innerHTML='Save →'; }
  };

  function showError() {
    document.getElementById('profile-loading').style.display='none';
    document.getElementById('profile-error').classList.remove('hidden');
  }

  loadProfile();
</script>
</body>
</html>
